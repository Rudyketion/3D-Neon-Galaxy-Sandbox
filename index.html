<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Galaxy Sandbox</title>
    <style>
        /* =========================================
           UI & UX: Dark Cyberpunk / Neon Design
           ========================================= */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* Back Button per strict requirements */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 15, 30, 0.7);
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 25px #00e5ff;
            text-shadow: none;
        }

        /* Control Panel */
        #ui-container {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(15, 15, 25, 0.85);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            width: 300px;
            backdrop-filter: blur(10px);
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
            text-align: center;
            border-bottom: 1px solid rgba(255, 0, 85, 0.3);
            padding-bottom: 15px;
        }

        .control-group {
            margin-bottom: 18px;
        }

        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff0055;
        }

        .color-pickers {
            display: flex;
            gap: 10px;
        }

        input[type=color] {
            width: 50%;
            height: 35px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        /* Audio Button */
        #audio-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: transparent;
            border: 1px solid #00ffaa;
            color: #00ffaa;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.2);
            text-shadow: 0 0 5px rgba(0, 255, 170, 0.5);
        }

        #audio-btn:hover {
            background: #00ffaa;
            color: #000;
            box-shadow: 0 0 20px #00ffaa;
            text-shadow: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff;
            letter-spacing: 3px;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        /* Custom Scrollbar for UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: #ff0055; border-radius: 3px; }
    </style>
</head>
<body>

    <!-- Back Button -->
    <a href="#" class="back-btn">← Späť na portál</a>

    <div id="loading">INICIALIZÁCIA VESMÍRU...</div>

    <!-- UI Controls -->
    <div id="ui-container">
        <h1>Galaxy Sandbox</h1>
        
        <div class="control-group">
            <label>Počet hviezd <span id="val-count">100k</span></label>
            <input type="range" id="p-count" min="10000" max="250000" step="10000" value="100000">
        </div>
        
        <div class="control-group">
            <label>Veľkosť galaxie <span id="val-radius">5.0</span></label>
            <input type="range" id="p-radius" min="1" max="15" step="0.5" value="5">
        </div>
        
        <div class="control-group">
            <label>Počet ramien <span id="val-branches">3</span></label>
            <input type="range" id="p-branches" min="2" max="8" step="1" value="3">
        </div>
        
        <div class="control-group">
            <label>Zakrivenie (Spin) <span id="val-spin">1.5</span></label>
            <input type="range" id="p-spin" min="-3" max="3" step="0.1" value="1.5">
        </div>

        <div class="control-group">
            <label>Rozptyl <span id="val-randomness">0.4</span></label>
            <input type="range" id="p-randomness" min="0" max="2" step="0.05" value="0.4">
        </div>

        <div class="control-group">
            <label>Farba Jadra / Okrajov</label>
            <div class="color-pickers">
                <input type="color" id="p-color-in" value="#ff4500">
                <input type="color" id="p-color-out" value="#0055ff">
            </div>
        </div>

        <button id="audio-btn">▶ Aktivovať vesmírny zvuk</button>
    </div>

    <!-- Scripts: Three.js and OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        /**
         * 1. CORE SETUP: Scene, Camera, Renderer
         */
        const scene = new THREE.Scene();
        // Add subtle fog for depth
        scene.fog = new THREE.FogExp2('#050505', 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.maxDistance = 20;

        /**
         * 2. VISUAL EFFECTS: Custom Glowing Particle Texture
         */
        const createGlowTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        };

        const particleTexture = createGlowTexture();

        /**
         * 3. 3D VISUALIZATION: Procedural Galaxy Generation
         */
        let geometry = null;
        let material = null;
        let points = null;

        const parameters = {
            count: 100000,
            size: 0.08,
            radius: 5,
            branches: 3,
            spin: 1.5,
            randomness: 0.4,
            randomnessPower: 3,
            insideColor: '#ff4500',
            outsideColor: '#0055ff'
        };

        const generateGalaxy = () => {
            // Destroy old galaxy to prevent memory leaks
            if (points !== null) {
                geometry.dispose();
                material.dispose();
                scene.remove(points);
            }

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(parameters.count * 3);
            const colors = new Float32Array(parameters.count * 3);

            const colorInside = new THREE.Color(parameters.insideColor);
            const colorOutside = new THREE.Color(parameters.outsideColor);

            for (let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;
                const radius = Math.random() * parameters.radius;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;
                const spinAngle = radius * parameters.spin;

                const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                // Color mixing based on distance from center
                const mixedColor = colorInside.clone();
                mixedColor.lerp(colorOutside, radius / parameters.radius);

                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            material = new THREE.PointsMaterial({
                size: parameters.size,
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                map: particleTexture,
                transparent: true,
                opacity: 0.8
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        };

        generateGalaxy();
        setTimeout(() => { document.getElementById('loading').style.opacity = '0'; }, 1000);

        /**
         * 4. WEB AUDIO API: Generative Ambient Sound
         * Satisfies audio requirement without being a visualizer
         */
        let audioCtx, oscillator, filter, gainNode;
        let isAudioPlaying = false;

        const initAudio = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Create a deep drone sound
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.value = 55; // Deep bass freq

            filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 200;
            filter.Q.value = 5;

            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0; // Start silent

            // Connect nodes
            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
        };

        const updateAudio = () => {
            if (!isAudioPlaying) return;
            // Modulate sound based on visual parameters
            const targetFreq = 40 + (parameters.branches * 10) + (parameters.spin * 15);
            const targetCutoff = 100 + (parameters.radius * 50);
            
            oscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.5);
            filter.frequency.setTargetAtTime(targetCutoff, audioCtx.currentTime, 0.5);
        };

        document.getElementById('audio-btn').addEventListener('click', () => {
            if (!audioCtx) initAudio();
            
            const btn = document.getElementById('audio-btn');
            if (isAudioPlaying) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 1);
                btn.innerText = "▶ Aktivovať vesmírny zvuk";
                btn.style.color = "#00ffaa";
                btn.style.borderColor = "#00ffaa";
                isAudioPlaying = false;
            } else {
                audioCtx.resume();
                gainNode.gain.setTargetAtTime(0.5, audioCtx.currentTime, 2); // Fade in
                btn.innerText = "⏸ Vypnúť zvuk";
                btn.style.color = "#ff0055";
                btn.style.borderColor = "#ff0055";
                isAudioPlaying = true;
                updateAudio();
            }
        });

        /**
         * 5. UI/UX INTERACTION: Real-time generation updates
         */
        const updateVal = (id, val, paramName) => {
            document.getElementById(`val-${id}`).innerText = val;
            parameters[paramName] = parseFloat(val);
            generateGalaxy();
            updateAudio();
        };

        document.getElementById('p-count').addEventListener('input', (e) => updateVal('count', e.target.value >= 1000 ? (e.target.value/1000)+'k' : e.target.value, 'count'));
        document.getElementById('p-radius').addEventListener('input', (e) => updateVal('radius', e.target.value, 'radius'));
        document.getElementById('p-branches').addEventListener('input', (e) => updateVal('branches', e.target.value, 'branches'));
        document.getElementById('p-spin').addEventListener('input', (e) => updateVal('spin', e.target.value, 'spin'));
        document.getElementById('p-randomness').addEventListener('input', (e) => updateVal('randomness', e.target.value, 'randomness'));
        
        document.getElementById('p-color-in').addEventListener('input', (e) => { parameters.insideColor = e.target.value; generateGalaxy(); });
        document.getElementById('p-color-out').addEventListener('input', (e) => { parameters.outsideColor = e.target.value; generateGalaxy(); });

        /**
         * 6. RESPONSIVENESS & ANIMATION LOOP
         */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        const tick = () => {
            const elapsedTime = clock.getElapsedTime();

            // Very subtle breathing effect to the stars
            if (points && material) {
                material.size = parameters.size + Math.sin(elapsedTime * 2) * 0.01;
            }

            controls.update();
            renderer.render(scene, camera);
            window.requestAnimationFrame(tick);
        };

        tick();
    </script>
</body>
</html>
